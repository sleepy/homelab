apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  chart:
    spec:
      chart: grafana
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    persistence:
      enabled: true
      size: 1Gi
    ingress:
      enabled: true
      hosts:
        - grafana.lab
      tls:
        - secretName: lab-tls
          hosts:
            - grafana.lab
